version: '3.8'

services:
  web:
    build: .
    restart: always
    networks:
      - webinar-net
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - BOT_SECRET=${BOT_SECRET}
      - WEBSITE_URL=https://webinars.bojumbohost.pp.ua
      - TZ=Europe/Kyiv
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - SENDPULSE_CLIENT_ID=${SENDPULSE_CLIENT_ID}
      - SENDPULSE_CLIENT_SECRET=${SENDPULSE_CLIENT_SECRET}
      - SENDPULSE_PIPELINE_ID=${SENDPULSE_PIPELINE_ID}
      - SENDPULSE_STAGE_REGISTERED=${SENDPULSE_STAGE_REGISTERED}
      - SENDPULSE_STAGE_VIEWED=${SENDPULSE_STAGE_VIEWED}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - storage-data:/app/data
      # ДОДАНО: зв'язок з вашою папкою для відео (FileZilla)
      - /home/bojumbo/webinar_videos:/app/public/uploads

  bot:
    build: .
    restart: always
    networks:
      - webinar-net
    command: node bot.js
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - BOT_SECRET=${BOT_SECRET}
      - WEBSITE_URL=http://web:3000
      - PUBLIC_URL=https://webinars.bojumbohost.pp.ua
      - TZ=Europe/Kyiv
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - web
    volumes:
      - storage-data:/app/data

  tunnel:
    image: cloudflare/cloudflared:2024.4.1
    restart: always
    networks:
      - webinar-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run

networks:
  webinar-net:
    driver: bridge

volumes:
  storage-data:
