version: '3.8'

services:
  web:
    build: .
    restart: always
    networks:
      - webinar-net
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - BOT_SECRET=${BOT_SECRET}
      - WEBSITE_URL=https://webinars.bojumbohost.pp.ua
      - PORT=3000
      - HOSTNAME=0.0.0.0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - storage-data:/app/data
      # ДОДАНО: зв'язок з вашою папкою для відео (FileZilla)
      - /home/bojumbo/webinar_videos:/app/public/uploads

  bot:
    build: .
    restart: always
    networks:
      - webinar-net
    command: node bot.js
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - BOT_SECRET=${BOT_SECRET}
      - WEBSITE_URL=http://web:3000
      - PUBLIC_URL=https://webinars.bojumbohost.pp.ua
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - web

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    networks:
      - webinar-net
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run

networks:
  webinar-net:
    driver: bridge

volumes:
  storage-data:
